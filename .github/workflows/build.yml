name: Build and test BSB

on:
  workflow_call:
    secrets:
      CODECOV_TOKEN:
        required: true

env:
  NEST_VERSION: 3.7
  NEST_FOLDER: ${{ github.workspace }}/.nx/installation/nest
  NX_DAEMON: false  # may prevent GHA to stall for some reason

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      UV_PYTHON: ${{ matrix.python-version }}
    strategy:
      matrix:
        python-version: [ "3.10", "3.12" ]
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Install apt dependencies
        run: |
          sudo apt update
          # Install `libopenmpi` for MPI, `libhdf5` for `morphio`,
          # `libgsl` and `libreadline` for NEST
          sudo apt install -y openmpi-bin libopenmpi-dev libhdf5-dev libreadline-dev libgsl-dev

      - name: Install nodejs
        uses: actions/setup-node@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Cache NEST
        uses: actions/cache@v4
        with:
          path: ${{ env.NEST_FOLDER }}
          key: ${{ runner.os }}-${{ matrix.python-version }}-nest

      - name: Run unittests
        timeout-minutes: 60
        env:
          BSB_QUIET: true
          BSB_OTEL_JSONLINES: "1"
          BSB_OTEL_O: "1"
          OTEL_EXPORTER_JSONLINES_PATH: ./traces_rank_*.jsonlines
        run: |
          npm install rimraf
          # Drop a sitecustomize.py that every Python subprocess
          # (including mpiexec ranks) auto-loads on startup; it wires
          # bsb-otel's JSONLinesSpanExporter when BSB_OTEL_JSONLINES is
          # set.  Lives outside the repo so the nx test target stays a
          # plain mpiexec command.
          SITE="$RUNNER_TEMP/otel-sitecustomize"
          mkdir -p "$SITE"
          cat > "$SITE/sitecustomize.py" <<'PYEOF'
          import os
          if os.environ.get("BSB_OTEL_JSONLINES"):
              try:
                  from opentelemetry import trace
                  from opentelemetry.sdk.trace import TracerProvider
                  from opentelemetry.sdk.trace.export import BatchSpanProcessor
                  from bsb_otel.exporters import JSONLinesSpanExporter
                  provider = TracerProvider()
                  provider.add_span_processor(
                      BatchSpanProcessor(JSONLinesSpanExporter())
                  )
                  trace.set_tracer_provider(provider)
              except Exception:
                  pass
          PYEOF
          export PYTHONPATH="$SITE${PYTHONPATH:+:$PYTHONPATH}"
          if [ "${{ github.ref }}" == "refs/heads/main" ]; then
            ./nx run-many -t test ;
          else
            ./nx affected -t test --base=origin/main --head=HEAD;
          fi
      - name: Upload OTel jsonlines traces
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: otel-traces-py${{ matrix.python-version }}
          path: |
            packages/*/traces_rank_*.jsonlines
            libs/*/traces_rank_*.jsonlines
          if-no-files-found: warn
      - name: Send coverage
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          verbose: true
          env_vars: PYTHON=${{ matrix.python-version }}
