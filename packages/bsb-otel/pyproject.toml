[build-system]
requires = ["flit_core>=3.2,<4"]
build-backend = "flit_core.buildapi"

[project]
name = "bsb-otel"
version = "7.3.1"
readme = "README.md"
requires-python = ">=3.10,<4"
dynamic = ["description"]
classifiers = [
  "License :: OSI Approved :: GNU General Public License v3 or later (GPLv3+)"
]
dependencies = [
  "bsb-core~=7.2",
  "opentelemetry-api~=1.0",
]

[project.optional-dependencies]
sdk = [
  "opentelemetry-sdk~=1.0",
  "opentelemetry-exporter-otlp~=1.38",
  "opentelemetry-exporter-otlp-proto-grpc~=1.0",
  "opentelemetry-distro>=0.59b0",
]

[[project.authors]]
name = "Robin De Schepper"
email = "robin@alexandria.sc"

[[project.authors]]
name = "Dimitri Rodarie"
email = "dimitri.rodarie@unipv.it"

[project.license]
file = "LICENSE"

[project.entry-points.opentelemetry_traces_exporter]
jsonlines = "bsb_otel.exporters:JSONLinesSpanExporter"

[project.entry-points.opentelemetry_environment_variables]
bsb = "bsb_otel._otel_env"

[dependency-groups]
test = [
  "bsb-core[parallel]",
  "bsb-test~=7.0",
  "coverage>=7.3",
]
docs = [
  "furo~=2024.0",
  "sphinxext-bsb~=7.0",
]
dev = [
  "pre-commit~=3.5",
  "ruff>=0.8.2",
]

[tool.uv]
default-groups = ["dev", "docs", "test"]

[tool.uv.sources]
bsb-core = { path = "../bsb-core", editable = true }
bsb-test = { path = "../bsb-test", editable = true }
sphinxext-bsb = { path = "../../libs/sphinxext-bsb", editable = true }

[tool.flit.module]
name = "bsb_otel"

[tool.coverage.run]
branch = true
source = ["bsb_otel"]

[tool.coverage.report]
exclude_lines = ["if typing.TYPE_CHECKING:", "pragma: nocover"]
show_missing = true

[tool.ruff]
exclude = [".ruff_cache", ".svn", ".tox", ".venv", "dist"]
line-length = 90
indent-width = 4

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
skip-magic-trailing-comma = false
line-ending = "auto"
docstring-code-format = true
docstring-code-line-length = 90

[tool.ruff.lint]
select = ["E", "F", "UP", "B", "SIM", "I"]
ignore = []
fixable = ["ALL"]
unfixable = []