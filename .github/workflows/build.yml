name: Build and test BSB

on:
  workflow_call:
    secrets:
      CODECOV_TOKEN:
        required: true

env:
  NEST_VERSION: 3.8
  NEST_FOLDER: ${{ github.workspace }}/.nx/installation/nest
  NX_DAEMON: false  # may prevent GHA to stall for some reason

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      UV_PYTHON: ${{ matrix.python-version }}
    strategy:
      matrix:
        python-version: [ "3.10", "3.12" ]
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      # Needed to build the bsb-native Rust extension (a bsb-core dependency)
      # when uv installs the workspace, and to run its `cargo test` target.
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install apt dependencies
        run: |
          sudo apt update
          # Install `libopenmpi` for MPI, `libhdf5` for `morphio`,
          # `libgsl` and `libreadline` for NEST, `libboost` required by NEST >= 3.8
          sudo apt install -y openmpi-bin libopenmpi-dev libhdf5-dev libreadline-dev libgsl-dev libboost-dev

      - name: Install nodejs
        uses: actions/setup-node@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Cache NEST
        uses: actions/cache@v4
        with:
          path: ${{ env.NEST_FOLDER }}
          key: ${{ runner.os }}-${{ matrix.python-version }}-nest-${{ env.NEST_VERSION }}

      # Build NEST outside the opentelemetry-instrument wrapper below: NEST's
      # CMake runs Python helpers, and the auto-instrumentation injected into
      # them writes to stderr and breaks NEST's configure step. Building here
      # first means the install-nest dependency of the test target finds NEST
      # already installed and exits early.
      - name: Install NEST
        run: uv run --project packages/bsb-core ./nx run bsb-nest:install-nest

      - name: Run unittests
        timeout-minutes: 60
        env:
          BSB_QUIET: true
          OTEL_PYTHON_DISTRO: bsb_jsonlines
          OTEL_EXPORTER_JSONLINES_PATH: ./traces_rank_*.jsonlines
        run: |
          npm install rimraf
          # uv --env-file lets the parent PYTHONPATH win, so the value
          # nest_vars.sh tries to set is masked by opentelemetry-instrument's
          # injection. Add NEST's site-packages to the outer PYTHONPATH so it
          # survives both layers.
          export PYTHONPATH="${{ github.workspace }}/.nx/installation/nest/install/lib/python${{ matrix.python-version }}/site-packages${PYTHONPATH:+:$PYTHONPATH}"
          if [ "${{ github.ref }}" == "refs/heads/main" ]; then
            uv run --project packages/bsb-core opentelemetry-instrument ./nx run-many -t test ;
          else
            uv run --project packages/bsb-core opentelemetry-instrument ./nx affected -t test --base=origin/main --head=HEAD;
          fi
      - name: Verify bsb-otel no-SDK contract
        # Run this step after main unit tests and combine coverage.
        timeout-minutes: 5
        env:
          BSB_QUIET: true
        run: |
          cd packages/bsb-otel
          uv run coverage run -p -m unittest -v \
            tests.test_bsb_otel.TestBsbTracerSpan.test_trace_no_ops_without_sdk_provider
          if [ -f .coverage ]; then
            uv run coverage combine --append
            uv run coverage xml -o ../../coverage/packages/bsb-otel/coverage.xml
          fi
      - name: Upload OTel jsonlines traces
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: otel-traces-py${{ matrix.python-version }}
          path: |
            packages/*/traces_rank_*.jsonlines
            libs/*/traces_rank_*.jsonlines
          if-no-files-found: warn
      - name: Send coverage
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          verbose: true
          env_vars: PYTHON=${{ matrix.python-version }}
